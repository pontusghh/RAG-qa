app:
  name: rag-qa-backend
  env: development

paths:
  data_dir: ./data
  default_dataset: ./ori_pqal.json
  chroma_dir: ./chroma_db
  logs_dir: ./logs
  query_log_file: ./logs/queries.log

embedding:
  model_name: sentence-transformers/all-mpnet-base-v2

llm:
  provider: groq
  model_name: llama-3.1-8b-instant
  api_key_env: GROQ_API_KEY
  api_base: https://api.groq.com/openai/v1
  temperature: 0.0
  max_tokens: 30

retrieval:
  top_k: 5

chunking:
  chunk_size: 1000
  chunk_overlap: 200

vector_store:
  collection_name: pubmedqa_rag

ingest:
  force_rebuild: false
